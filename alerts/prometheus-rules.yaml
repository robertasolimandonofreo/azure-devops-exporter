apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: azure-devops-exporter-alerts
  labels:
    release: prometheus
spec:
  groups:
    - name: azure-devops-exporter.rules
      rules:
        # azure_devops_exporter_scrape_errors_total is the one real Prometheus counter this
        # exporter exposes, so increase() is correct here.
        - alert: AzureDevOpsExporterScrapeFailing
          expr: increase(azure_devops_exporter_scrape_errors_total[10m]) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Azure DevOps Exporter scrape failing
            description: >-
              The exporter has failed to scrape the {{ $labels.component }} component
              for project {{ $labels.project }} in the last 10 minutes.

        - alert: AzureDevOpsExporterScrapeStale
          expr: time() - azure_devops_exporter_last_successful_scrape_timestamp > 900
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Azure DevOps Exporter has not completed a successful scrape recently
            description: >-
              Component {{ $labels.component }} for project {{ $labels.project }} has not
              completed a successful scrape in over 15 minutes.

        # Every metric below this point is a gauge (a recomputed snapshot per scrape, not a
        # monotonic counter — see the README), so these alerts compare current values
        # directly instead of using increase()/rate().
        - alert: AzureDevOpsPipelineFailing
          expr: azure_devops_pipeline_runs_failed > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Azure DevOps pipeline has failing runs
            description: >-
              Pipeline {{ $labels.pipeline }} in project {{ $labels.project }} has
              {{ $value }} failed run(s) in the last 24 hours.

        - alert: AzureDevOpsPipelineNotRunRecently
          expr: (time() - azure_devops_pipeline_last_run_timestamp) > 7 * 24 * 3600
          for: 10m
          labels:
            severity: info
          annotations:
            summary: Azure DevOps pipeline has not run in over a week
            description: >-
              Pipeline {{ $labels.pipeline }} in project {{ $labels.project }} last ran
              more than 7 days ago.

        - alert: AzureDevOpsReleaseDeploymentFailing
          expr: azure_devops_release_deployments_failed > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Azure DevOps release has failing deployments
            description: >-
              Release {{ $labels.release_definition }} / {{ $labels.environment }} in
              project {{ $labels.project }} has {{ $value }} failed deployment(s) in the
              last 30 days.

        - alert: AzureDevOpsStalePullRequests
          expr: azure_devops_repo_stale_pull_requests_total > 0
          for: 1h
          labels:
            severity: info
          annotations:
            summary: Stale pull requests detected
            description: >-
              Repository {{ $labels.repository }} in project {{ $labels.project }} has
              {{ $value }} pull request(s) open for more than 14 days.

        - alert: AzureDevOpsStaleWorkItems
          expr: azure_devops_boards_work_items_stale_total > 0
          for: 1h
          labels:
            severity: info
          annotations:
            summary: Stale work items detected
            description: >-
              Project {{ $labels.project }} has {{ $value }} {{ $labels.work_item_type }}
              work item(s) in state {{ $labels.state }} with no changes in more than 14
              days.

        - alert: AzureDevOpsPullRequestsWithConflicts
          expr: azure_devops_repo_pull_requests_with_conflicts_total > 0
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: Pull requests with merge conflicts
            description: >-
              Repository {{ $labels.repository }} in project {{ $labels.project }} has
              {{ $value }} active pull request(s) with merge conflicts, blocking them from
              being merged.

        - alert: AzureDevOpsPipelineRunStuck
          expr: azure_devops_pipeline_runs_in_progress > 0
          for: 2h
          labels:
            severity: warning
          annotations:
            summary: Pipeline run has been in progress for an unusually long time
            description: >-
              Pipeline {{ $labels.pipeline }} in project {{ $labels.project }} has had a run
              in progress for over 2 hours — likely hung rather than genuinely still running.
              Only catches runs queued within the last 24 hours; see README.

        # Severity string values (e.g. "1 - Critical") are whatever the process template
        # defines, so this regex is a starting point — adjust it to match your org's naming
        # before relying on it.
        - alert: AzureDevOpsCriticalBugsOpen
          expr: azure_devops_boards_bugs_by_severity{severity=~"1.*"} > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Critical-severity bugs open
            description: >-
              Project {{ $labels.project }} has {{ $value }} bug(s) at severity
              "{{ $labels.severity }}".

        # The four rules below encode one team's Story Points/WIP conventions rather than
        # anything Azure DevOps enforces itself — the state names ("Todo", "In Progress"), the
        # 13-point "should have been split" threshold, the WIP limit of 5, and the "several
        # blocked items" threshold of 3 are all specific to that team's process. Adjust or drop
        # whichever of these don't match your own board before relying on them.
        - alert: AzureDevOpsUnrefinedItemInTodo
          expr: azure_devops_boards_work_items_without_estimate_total{state="Todo"} > 0
          for: 1h
          labels:
            severity: info
          annotations:
            summary: Unestimated work item(s) in Todo
            description: >-
              Project {{ $labels.project }} has {{ $value }} {{ $labels.work_item_type }}
              item(s) in Todo with no Story Points or Effort set — by convention, an
              unrefined item shouldn't be moved into Todo yet.

        - alert: AzureDevOpsLargeItemNotSplit
          expr: >-
            azure_devops_boards_work_item_story_points{state!~"Closed|Done|Resolved|Completed"} >= 13
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: Large work item still open
            description: >-
              {{ $labels.work_item_type }} #{{ $labels.work_item_id }} in project
              {{ $labels.project }} has {{ $value }} Story Points and is still open — items
              at 13+ points are meant to be split into smaller ones before starting.

        - alert: AzureDevOpsWIPLimitExceeded
          expr: >-
            sum(azure_devops_boards_work_items_by_state{state="In Progress"}) by (organization, project) > 5
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: WIP limit exceeded in In Progress
            description: >-
              Project {{ $labels.project }} has {{ $value }} work item(s) in In Progress,
              above the team's WIP limit of 5.

        - alert: AzureDevOpsManyBlockedItems
          expr: sum(azure_devops_boards_work_items_blocked_total) by (organization, project) > 3
          for: 2h
          labels:
            severity: info
          annotations:
            summary: Several work items blocked
            description: >-
              Project {{ $labels.project }} has {{ $value }} work item(s) tagged "blocked" —
              worth checking whether they're actually getting unblocked or just piling up.
