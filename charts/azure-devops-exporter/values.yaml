replicaCount: 1

image:
  # Published by .github/workflows/docker-publish.yml on every push to main (tag "latest")
  # and on "vX.Y.Z" git tags (semver tags). Override for a fork or a different registry.
  repository: ghcr.io/robertasolimandonofreo/azure-devops-exporter
  tag: latest
  # "latest" is a mutable tag — a node that already pulled it once will keep reusing that
  # cached copy under IfNotPresent even after the registry's "latest" moves to a new image,
  # since IfNotPresent only checks whether the name:tag string exists locally, not whether its
  # content changed. Always is the safe default for a moving tag; if you pin image.tag to an
  # immutable reference (a specific git SHA or "vX.Y.Z" release), IfNotPresent is fine again.
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

# azureDevOps configures the exporter's connection to Azure DevOps. organization and
# projects are required; token is required unless existingSecret is set.
azureDevOps:
  organization: "my-org"
  # Optionally restrict a project to specific collectors with ":collector+collector"
  # (repos, boards, pipelines, releases) — e.g. "proj-a:pipelines+boards,proj-b:repos" —
  # see README's "Per-project collector selection" section.
  projects: "proj-a,proj-b"
  apiUrl: "https://dev.azure.com"
  token: "change-me"
  # existingSecret, if set, is the name of a pre-existing Secret with an
  # AZURE_DEVOPS_TOKEN key — the chart won't create its own Secret in that case, and
  # azureDevOps.token above is ignored.
  existingSecret: ""
  # Optional: break azure_devops_boards_work_items_by_custom_field_total down by
  # project-specific work item fields (reference names, not display names), each
  # optionally followed by ":label" — e.g. "Custom.Platform:platform,Custom.Squad" —
  # see README's "Custom fields (Boards)" section. Omitted from the ConfigMap entirely
  # when left empty.
  boardsCustomFields: ""

exporter:
  port: 8080
  scrapeIntervalSeconds: 300
  logLevel: info

service:
  type: ClusterIP
  port: 8080

serviceMonitor:
  # Requires the Prometheus Operator CRDs to be installed in the cluster.
  enabled: true
  interval: 5m
  labels:
    release: prometheus

# Defaults for a small Go binary that's mostly idle between scrapes, with brief CPU/memory
# spikes while paginating through API responses during a scrape cycle. Tune down further if
# you run a single small project, or up if you scrape many projects with large repos/boards.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi

securityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
