name: Create release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64  }
          - { goos: linux,   goarch: arm64  }
          - { goos: darwin,  goarch: amd64  }
          - { goos: darwin,  goarch: arm64  }
          - { goos: windows, goarch: amd64  }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          output="azure-devops-exporter-${GOOS}-${GOARCH}${ext}"
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o "${output}" \
            .
          sha256sum "${output}" > "${output}.sha256"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            azure-devops-exporter-${{ matrix.goos }}-${{ matrix.goarch }}*
          if-no-files-found: error
          retention-days: 1

  package-helm:
    name: Package Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Package chart
        run: helm package charts/azure-devops-exporter --destination .helm-package

      - uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: .helm-package/*.tgz
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish GitHub release
    needs: [build-binaries, package-helm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/azure-devops-exporter-*
            dist/*.tgz
            dashboards/grafana-dashboard.json
            dashboards/grafana-boards-sprint.json
            alerts/prometheus-rules.yaml
